[defaults]
inventory = inventory/hosts.ini
# Ensure local project roles are discoverable (ansible/roles/*).
roles_path = roles
# Disabled for development convenience in this pet project.
# Enable host key checking in production environments.
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
interpreter_python = auto

[privilege_escalation]
become = True
become_method = sudo
