---
# Роль docker: установка Docker Engine и Docker Compose plugin
# Идемпотентна: повторный запуск безопасен

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key to keyring
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

  # NOTE: apt_repository uses signed-by=/etc/apt/keyrings/docker.asc
  # to avoid deprecated apt_key usage.

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start and enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true

- name: Verify Docker installation
  ansible.builtin.command: docker --version
  register: docker_version_result
  changed_when: false

- name: Display Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version_result.stdout }}"

- name: Verify Docker Compose plugin
  ansible.builtin.command: docker compose version
  register: compose_version_result
  changed_when: false

- name: Display Docker Compose version
  ansible.builtin.debug:
    msg: "{{ compose_version_result.stdout }}"
