---
# Роль common: базовая подготовка Ubuntu-сервера
# Идемпотентна: повторный запуск безопасен

- name: Ensure server reachable
  ansible.builtin.ping:

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Create project directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"
  loop: "{{ app_directories }}"
