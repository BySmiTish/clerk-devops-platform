<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clerk — Game</title>
  <link rel="stylesheet" href="assets/clerk.css" />
</head>
<body>
  <main class="clerkPage">
    <section class="playerSection">
      <div class="playerWrap">
        <iframe
          id="clerkGameFrame"
          class="playerFrame"
          src="game/?v=fs3"
          title="Clerk Web Demo"
          allow="fullscreen"
        ></iframe>
      </div>
    </section>

    <section class="socialSection">
      <div class="reactionsBlock">
        <div class="reactionsRow">
          <div class="reactionsLeft">
            <button type="button" id="btnLike" class="reactionBtn reaction-like" title="Like" aria-label="Like">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M8 11v10"/><path d="M8 21H6.6c-.9 0-1.6-.7-1.6-1.6v-6.8C5 11.7 5.7 11 6.6 11H8"/><path d="M8 21h9.5c1.3 0 2.4-.9 2.7-2.2l1.2-6.2c.3-1.6-.9-3-2.5-3H14.5c.2-1.4.4-3.4.4-4.4 0-1.4-1.1-2.6-2.6-2.6h-.3l-2.6 5.3c-.4.8-.6 1.6-.6 2.5V11"/></svg>
              <span id="likesCount" class="reactionCount">0</span>
            </button>
            <button type="button" id="btnDislike" class="reactionBtn reaction-dislike" title="Dislike" aria-label="Dislike">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M8 13V3"/><path d="M8 3H6.6C5.7 3 5 3.7 5 4.6v6.8C5 12.3 5.7 13 6.6 13H8"/><path d="M8 3h9.5c1.3 0 2.4.9 2.7 2.2l1.2 6.2c.3 1.6-.9 3-2.5 3H14.5c.2 1.4.4 3.4.4 4.4 0 1.4-1.1 2.6-2.6 2.6h-.3l-2.6-5.3c-.4-.8-.6-1.6-.6-2.5V13"/></svg>
              <span id="dislikesCount" class="reactionCount">0</span>
            </button>
          </div>
          <button type="button" id="btnShare" class="reactionBtn shareBtn" data-action="share" title="Share" aria-label="Share">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </div>
      </div>

      <div class="commentsBlock social-panel commentsPanel" id="commentsPanel">
        <button type="button" class="commentsTitleBtn" id="commentsTitleBtn" aria-expanded="true" aria-controls="commentsBodyWrap">
          <h3 class="commentsTitle">Comments <span class="commentsCountBadge muted" id="commentsCount">(0)</span></h3>
          <span class="commentsTitleChevron" aria-hidden="true"></span>
        </button>

        <div id="commentsBodyWrap" class="commentsBodyWrap">
        <form id="commentForm" class="commentForm">
          <input type="text" id="commentAuthor" placeholder="Name" class="commentInput" minlength="2" maxlength="32" />
          <textarea id="commentBody" placeholder="Add a comment…" class="commentTextarea" rows="3" maxlength="1000"></textarea>
          <button type="submit" class="btn commentPostBtn" id="btnPostComment">Post</button>
          <div id="formPostErr" class="formErr" style="display:none"></div>
        </form>

        <div id="commentsList" class="commentsList"></div>
        <div id="commentsLoading" class="commentsLoading muted" style="display:none">Loading…</div>
        <div id="commentsErr" class="commentsErr" style="display:none"></div>
        <button type="button" id="btnLoadMore" class="btn secondary commentLoadMore" style="display:none">Show more comments</button>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/clerk.js" defer></script>
</body>
</html>
